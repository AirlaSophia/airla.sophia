<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airla Sophia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html { 
            scroll-behavior: smooth; 
        }
        
        :root {   
            --prussian: #101d30; 
            --midnight: #1b2e4b; 
            --slate: #3a536d;   
            --gold: #c9a84c; 
            --gold-lt: #e2c371; 
            --pale: #f0dfa0; 
            --cream: #f5eedc; 
            --cream-dim: rgba(245,238,220,0.72); 
            --white-soft: #fbf9f5; 
        }
        
        body { 
            font-family: "Cormorant Garamond", Georgia, serif; 
            background: var(--prussian); 
            color: var(--cream); 
            overflow-x: hidden; 
        }

        /* NAVIGATION */
        nav { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 100; 
            padding: 22px 48px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            background: linear-gradient(to bottom, rgba(16,29,48,0.88) 0%, transparent 100%); 
        }
        
        .nav-links { 
            display: flex; 
            gap: 36px; 
            list-style: none; 
        }
        
        .nav-links a { 
            font-family: "Cinzel", serif; 
            font-size: 0.9rem; 
            letter-spacing: 0.18em; 
            color: var(--cream); 
            text-decoration: none; 
            text-transform: uppercase; 
            transition: color 0.35s ease; 
        }
        
        .nav-links a:hover { 
            color: var(--gold); 
        }

        /* HERO SECTION */
        .hero { 
            position: relative; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 0 20px; 
        }
        
        .hero-bg { 
            position: absolute; 
            inset: 0; 
            background-color: var(--prussian); 
            background-image: radial-gradient(circle at center, var(--midnight) 0%, var(--prussian) 100%); 
            z-index: -1; 
        }
        
        .hero-title { 
            font-family: "Cinzel", serif; 
            font-size: 3.5rem; 
            font-weight: 400; 
            letter-spacing: 0.2em; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: 10px; 
        }
        
        .hero-subtitle { 
            font-size: 1.5rem; 
            font-style: italic; 
            color: var(--cream-dim); 
            letter-spacing: 0.05em; 
        }

        /* FEATURED FLYER SECTION */
        .event-container { 
            padding: 100px 24px; 
            max-width: 1200px; 
            margin: 0 auto; 
            text-align: center; 
        }

        .section-title { 
            font-family: "Cinzel", serif; 
            font-size: 2rem; 
            letter-spacing: 0.15em; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: 48px; 
        }

        .flyer-display { 
            margin: 0 auto; 
            max-width: 650px; 
            background: var(--midnight); 
            padding: 24px; 
            border: 1px solid rgba(201, 168, 76, 0.2); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }

        .flyer-image { 
            width: 100%; 
            height: auto; 
            display: block; 
            border: 1px solid rgba(201, 168, 76, 0.1); 
        }

        .event-details { 
            margin-top: 24px; 
        }

        .event-details h3 { 
            font-family: "Cinzel", serif; 
            font-size: 1.4rem; 
            letter-spacing: 0.1em; 
            color: var(--cream); 
            margin-bottom: 8px; 
        }

        .event-details p { 
            font-size: 1.1rem; 
            color: var(--cream-dim); 
            line-height: 1.6; 
        }

        /* FOOTER */
        footer { 
            padding: 60px 24px; 
            text-align: center; 
            background: #0b1421; 
            border-top: 1px solid rgba(201, 168, 76, 0.1); 
            font-size: 0.9rem; 
            letter-spacing: 0.05em; 
            color: var(--slate); 
        }
    </style>
</head>
<body>

    <nav>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#about">About</a></li>
        </ul>
    </nav>

    <main id="home">
        <section class="hero">
            <div class="hero-bg"></div>
            <h1 class="hero-title">Airla Sophia</h1>
            <p class="hero-subtitle">Curated Gatherings & Visual Artistry</p>
        </section>

        <section id="events" class="event-container">
            <h2 class="section-title">Monthly Event</h2>
            <div class="flyer-display">
                <!-- Waterhouse paintings successfully removed. Now hosting your localized monthly asset. -->
                <img src="sip-and-see-flyer.jpg" alt="Sip and See Event Flyer" class="flyer-image">
                <div class="event-details">
                    <h3>Sip &amp; See Showcase</h3>
                    <p>Join us for our signature monthly convergence of classical ambiance, brilliant discourse, and fine curation.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Airla Sophia. All rights reserved.</p>
    </footer>

</body>
</html>

```
